<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PR code analysis</title>
<style>
  :root { color-scheme:dark; font:14px system-ui; background:#111827; color:#e5e7eb }
  body { margin:0 auto; padding:28px; max-width:1200px } h1 { margin:0 0 4px } .muted { color:#9ca3af }
  #cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin:22px 0 }
  .card { background:#1f2937; border:1px solid #374151; border-radius:7px; padding:14px } .value { font-size:24px; font-weight:700 }
  table { width:100%; border-collapse:collapse } th,td { text-align:left; padding:9px; border-bottom:1px solid #374151 }
  th { color:#9ca3af } .plus { color:#6ee7b7 } .minus { color:#fca5a5 } details { margin:4px 0 }
</style>
<h1>PR code analysis</h1><div id="base" class="muted"></div><section id="cards"></section>
<table><thead><tr><th>File</th><th>Status</th><th>Lines</th><th>Code</th><th>Complexity</th></tr></thead><tbody id="files"></tbody></table>
<script>
const result = /*__DATA__*/null;
const signed = n => (n >= 0 ? '+' : '') + n;
const tone = n => (n > 0 ? 'plus' : n < 0 ? 'minus' : '');
const cell = (text, cls) => { const td = document.createElement('td'); td.textContent = text; if (cls) td.className = cls; return td; };

document.querySelector('#base').textContent = `Compared with ${result.base} at ${result.mergeBase.slice(0, 12)}`;

const codeDelta = result.codeAfter - result.codeBefore;
const complexityNet = result.complexityAfter - result.complexityBefore;
const cards = [
  ['Changed files', result.files.length],
  ['Lines', `+${result.linesAdded} / -${result.linesDeleted}`],
  ['Code delta', signed(codeDelta), tone(codeDelta)],
  ['Complexity added', `+${result.complexityAdded}`, tone(result.complexityAdded)],
  ['Complexity removed', `-${result.complexityRemoved}`, tone(-result.complexityRemoved)],
  ['Complexity net', signed(complexityNet), tone(complexityNet)],
];
for (const [label, value, cls] of cards) {
  const card = document.createElement('div');
  card.className = 'card';
  const v = document.createElement('div');
  v.className = 'value' + (cls ? ' ' + cls : '');
  v.textContent = value;
  const l = document.createElement('div');
  l.className = 'muted';
  l.textContent = label;
  card.append(v, l);
  document.querySelector('#cards').append(card);
}

const files = document.querySelector('#files');
for (const file of result.files) {
  const row = document.createElement('tr');
  row.append(
    cell(file.path),
    cell(file.status),
    cell(`+${file.linesAdded} / -${file.linesDeleted}`),
    cell(signed(file.codeAfter - file.codeBefore), tone(file.codeAfter - file.codeBefore)),
    cell(`+${file.complexityAdded} / -${file.complexityRemoved}`),
  );
  files.append(row);
  for (const fn of file.functions || []) {
    const detail = document.createElement('tr');
    const c = cell(`↳ ${fn.name}: c${fn.before} → c${fn.after} (${signed(fn.delta)})`, 'muted');
    c.colSpan = 5;
    detail.append(c);
    files.append(detail);
  }
}
</script>
</html>
